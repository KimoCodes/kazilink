version: "3.8"

services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    environment:
      APP_ENV: local
      APP_DEBUG: "false"
      APP_URL: "http://127.0.0.1:8080"
      SESSION_NAME: informal_session
      CSRF_TOKEN_NAME: _token
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: informal_marketplace
      DB_USER: informal_user
      DB_PASS: informal_pass

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: informal_marketplace
      MARIADB_USER: informal_user
      MARIADB_PASSWORD: informal_pass
      MARIADB_ROOT_PASSWORD: rootpass
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
